<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>HTML→PPTX変換 - タブ設定</title>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 24px;">
  <p>「保存」を押すと、このチャネル/チャットに変換ツールのタブが追加されます。</p>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        microsoftTeams.pages.config.setConfig({
          entityId: "html2pptxTeamTab",
          contentUrl: window.location.origin + "/",
          websiteUrl: window.location.origin + "/",
          suggestedDisplayName: "HTML→PPTX変換",
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.pages.config.setValidityState(true);
    });
  </script>
</body>
</html>
